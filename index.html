<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vinay Writes | Screenplay Writer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .page { display: none; }
        .active { display: block !important; }
        body.admin-mode .user-view-only { display: none !important; }
        .admin-section { display: none; }
        body.admin-mode .admin-section { display: block !important; }
        .writer-reply { border-left: 4px solid #ef4444; background: #18181b; padding: 15px; border-radius: 12px; margin-top: 10px; margin-left: 20px; }
        
        /* SECURITY: Blocking text selection */
        .no-select {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        /* SECURITY: Preventing screenshots (Best possible browser effort) */
        @media print {
            body { display: none; }
        }
    </style>
</head>
<body class="bg-black text-white font-sans selection:bg-red-500 no-select" oncontextmenu="return false;">

    <nav class="p-5 flex justify-between items-center bg-zinc-900 sticky top-0 z-50 border-b border-zinc-800">
        <h1 class="text-2xl font-bold text-red-500 cursor-pointer" onclick="showHome()">Vinay Writes</h1>
        <button id="view-toggle" onclick="toggleAdmin()" class="bg-zinc-800 px-4 py-2 rounded-full text-xs font-bold border border-zinc-700 uppercase">Admin Login</button>
    </nav>

    <div id="home-page" class="page active">
        <header class="user-view-only pt-32 pb-20 px-6 text-center bg-gradient-to-b from-zinc-900 to-black">
            <h2 class="text-red-500 font-bold tracking-[0.3em] mb-6 uppercase text-sm">Telugu Screenplay Writer</h2>
            <h1 class="text-6xl md:text-8xl font-black mb-8 leading-tight uppercase italic text-white">Stories That <br><span class="text-red-600">Hit Different.</span></h1>
            
            <div class="flex flex-col items-center gap-6 mt-10">
                <h3 class="text-2xl font-black uppercase tracking-widest italic text-zinc-400">Read My Stories</h3>
                <div class="flex flex-wrap justify-center gap-4">
                    <button onclick="renderStories('Short Film Stories')" class="bg-zinc-800 border border-zinc-700 px-8 py-4 rounded-2xl font-black hover:bg-red-600 transition uppercase">Short Film Stories</button>
                    <button onclick="renderStories('Movie Scenes')" class="bg-zinc-800 border border-zinc-700 px-8 py-4 rounded-2xl font-black hover:bg-red-600 transition uppercase">Movie Scenes</button>
                    <button onclick="renderStories('Serial Content')" class="bg-zinc-800 border border-zinc-700 px-8 py-4 rounded-2xl font-black hover:bg-red-600 transition uppercase">Serial Content</button>
                </div>
            </div>
        </header>

        <section id="portfolio" class="user-view-only py-20 px-6 bg-black">
            <div id="story-grid" class="max-w-7xl mx-auto grid md:grid-cols-3 gap-8"></div>
        </section>

        <footer class="user-view-only py-32 px-6 bg-orange-600">
            <div class="max-w-5xl mx-auto text-center text-white">
                <h3 class="text-5xl md:text-7xl font-black mb-8 italic uppercase">Let's Collaborate.</h3>
                <div class="grid md:grid-cols-2 gap-8 max-w-4xl mx-auto">
                    <div class="p-10 bg-zinc-950 rounded-[3rem] border-2 border-black">
                        <span class="text-orange-500 font-black uppercase text-[10px] mb-3 block">Email</span>
                        <a href="mailto:kammarivinaykumar981@gmail.com" class="text-lg md:text-xl font-bold">kammarivinaykumar981@gmail.com</a>
                    </div>
                    <div class="p-10 bg-zinc-950 rounded-[3rem] border-2 border-black">
                        <span class="text-green-500 font-black uppercase text-[10px] mb-3 block">WhatsApp</span>
                        <a href="https://wa.me/917981587505" target="_blank" class="text-2xl md:text-3xl font-bold">+91 79815 87505</a>
                    </div>
                </div>
            </div>
        </footer>

        <section class="admin-section py-20 px-6 bg-zinc-900 min-h-screen">
            <div class="max-w-3xl mx-auto bg-black p-10 rounded-[3rem] border border-red-600 mb-20 shadow-2xl">
                <h2 id="form-title" class="text-3xl font-black text-red-500 mb-10 text-center uppercase italic">Post New Content</h2>
                <form id="story-form" class="space-y-6">
                    <input type="hidden" id="edit-index" value="-1">
                    <input type="text" id="title" placeholder="Story Title" class="w-full p-5 rounded-2xl bg-zinc-900 border border-zinc-800 text-white outline-none font-bold" required>
                    <select id="category" class="w-full p-5 rounded-2xl bg-zinc-900 border border-zinc-800 text-white outline-none font-bold" required>
                        <option value="">Choose Category...</option>
                        <option value="Short Film Stories">Short Film Stories</option>
                        <option value="Movie Scenes">Movie Scenes</option>
                        <option value="Serial Content">Serial Content</option>
                    </select>
                    <textarea id="fullStory" placeholder="Full script content..." class="w-full p-5 h-80 rounded-2xl bg-zinc-900 border border-zinc-800 text-white outline-none"></textarea>
                    <button type="submit" id="submit-btn" class="w-full bg-red-600 py-5 rounded-2xl font-black text-xl hover:bg-red-700 transition uppercase text-white text-white">Publish Story</button>
                    <button type="button" onclick="resetForm()" class="w-full bg-zinc-800 py-2 rounded-xl mt-2 text-white">Reset</button>
                </form>
            </div>
            <div id="admin-lists-container" class="max-w-7xl mx-auto space-y-20 text-white"></div>
        </section>
    </div>

    <div id="details-page" class="page p-6 md:p-20 bg-black min-h-screen">
        <button onclick="showHome()" class="text-red-500 mb-10 font-bold uppercase tracking-widest">← BACK</button>
        <div id="details-content" class="max-w-4xl mx-auto text-white"></div>
        
        <div class="max-w-4xl mx-auto mt-10 text-center">
            <button id="like-btn" onclick="toggleLike()" class="bg-zinc-900 border border-zinc-700 px-8 py-3 rounded-full text-white font-bold hover:bg-red-600 transition flex items-center gap-3 mx-auto">
                <span id="like-icon">🤍</span> <span id="like-count">0</span> Likes
            </button>
        </div>

        <div class="max-w-4xl mx-auto mt-20 border-t border-zinc-900 pt-10">
            <h3 class="text-2xl font-bold mb-8 text-red-500 italic uppercase">Feedbacks</h3>
            <div id="comment-list" class="space-y-6 mb-10"></div>
            <div class="bg-zinc-900 p-8 rounded-[2rem]">
                <textarea id="user-comment" placeholder="Write your feedback here..." class="w-full p-5 rounded-2xl bg-zinc-800 border border-zinc-700 mb-4 h-32 outline-none text-white"></textarea>
                <button onclick="postComment()" class="bg-red-600 px-12 py-4 rounded-2xl font-bold uppercase tracking-widest text-white">Post Feedback</button>
            </div>
        </div>
    </div>

    <script>
        let isAdmin = false;
        let stories = JSON.parse(localStorage.getItem('vinay_vfinal_v6')) || [];
        let comments = JSON.parse(localStorage.getItem('vinay_vfinal_comments')) || {};
        let currentStoryIndex = -1;

        function toggleAdmin() {
            if(!isAdmin) {
                if(prompt("Admin Password:") === "vinay123") {
                    isAdmin = true;
                    document.body.classList.add('admin-mode');
                    document.getElementById('view-toggle').innerText = "LOGOUT ADMIN";
                }
            } else {
                isAdmin = false;
                document.body.classList.remove('admin-mode');
                document.getElementById('view-toggle').innerText = "ADMIN LOGIN";
            }
            renderStories('None');
        }

        function renderStories(filter = 'None') {
            const userGrid = document.getElementById('story-grid');
            const adminContainer = document.getElementById('admin-lists-container');
            
            const createCard = (s, globalIndex) => `
                <div class="bg-zinc-900 border border-zinc-800 rounded-[2.5rem] p-10 relative hover:border-red-600 transition-all duration-500">
                    <div class="absolute top-4 left-4 text-[10px] bg-red-600 px-2 py-1 rounded-full font-bold">❤️ ${s.likes || 0}</div>
                    ${isAdmin ? `
                        <div class="absolute top-4 right-4 flex gap-2">
                            <button onclick="editStory(${globalIndex})" class="bg-blue-600 p-1 px-2 rounded-full text-[8px] font-black uppercase text-white">Edit</button>
                            <button onclick="deleteStory(${globalIndex})" class="bg-red-600 p-1 px-2 rounded-full text-[8px] font-black uppercase text-white">Del</button>
                        </div>
                    ` : ''}
                    <span class="text-red-500 text-[10px] font-black uppercase tracking-widest mb-4 block">${s.category}</span>
                    <h3 class="text-3xl font-black mb-8 uppercase italic text-white">${s.title}</h3>
                    <button onclick="showDetails(${globalIndex})" class="w-full border border-zinc-700 py-4 rounded-2xl font-black uppercase hover:bg-red-600 transition text-sm text-white">Read Script</button>
                </div>`;

            if(isAdmin) {
                const cats = ['Short Film Stories', 'Movie Scenes', 'Serial Content'];
                adminContainer.innerHTML = cats.map(cat => `
                    <div>
                        <h3 class="text-3xl font-black mb-8 border-b-4 border-red-600 pb-2 uppercase italic">${cat}</h3>
                        <div class="grid md:grid-cols-3 gap-8">${stories.filter(s => s.category === cat).map(s => createCard(s, stories.indexOf(s))).join('')}</div>
                    </div>`).join('');
            } else {
                if(filter === 'None') { userGrid.innerHTML = ""; return; }
                const filtered = stories.filter(s => !s.hidden && s.category === filter);
                userGrid.innerHTML = filtered.map(s => createCard(s, stories.indexOf(s))).join('');
                window.scrollTo({ top: userGrid.offsetTop - 100, behavior: 'smooth' });
            }
        }

        function showDetails(index) {
            currentStoryIndex = index;
            const s = stories[index];
            document.getElementById('home-page').classList.remove('active');
            document.getElementById('details-page').classList.add('active');
            document.getElementById('details-content').innerHTML = `
                <h1 id="current-story-title" class="text-5xl md:text-7xl font-black mb-12 uppercase italic underline decoration-red-600 decoration-8 text-white">${s.title}</h1>
                <div class="text-zinc-300 text-xl leading-relaxed whitespace-pre-line font-medium">${s.story}</div>
            `;
            document.getElementById('like-count').innerText = s.likes || 0;
            document.getElementById('like-icon').innerText = s.isLiked ? "❤️" : "🤍";
            loadComments(s.title);
            window.scrollTo(0,0);
        }

        function toggleLike() {
            const s = stories[currentStoryIndex];
            if(!s.likes) s.likes = 0;
            
            if(!s.isLiked) {
                s.likes++;
                s.isLiked = true;
                document.getElementById('like-icon').innerText = "❤️";
            } else {
                s.likes--;
                s.isLiked = false;
                document.getElementById('like-icon').innerText = "🤍";
            }
            document.getElementById('like-count').innerText = s.likes;
            localStorage.setItem('vinay_vfinal_v6', JSON.stringify(stories));
        }

        function loadComments(title) {
            const list = document.getElementById('comment-list');
            const storyComments = comments[title] || [];
            list.innerHTML = storyComments.map((c, i) => `
                <div class="bg-zinc-900 p-6 rounded-2xl border border-zinc-800 relative text-white">
                    ${isAdmin ? `<button onclick="deleteComment('${title}', ${i})" class="absolute top-4 right-4 text-red-500 font-bold text-[10px]">Remove</button>` : ''}
                    <span class="text-[10px] font-black uppercase text-zinc-500 tracking-widest">Feedback</span>
                    <p class="text-zinc-200 mt-2 text-lg font-medium">${c.text}</p>
                </div>`).join('') || `<p class="text-zinc-600 uppercase text-xs">No feedback yet.</p>`;
        }

        function postComment() {
            const textInput = document.getElementById('user-comment');
            const title = document.getElementById('current-story-title').innerText;
            if(!textInput.value.trim()) return;
            if(!comments[title]) comments[title] = [];
            comments[title].push({ text: textInput.value, date: new Date().toLocaleDateString() });
            localStorage.setItem('vinay_vfinal_comments', JSON.stringify(comments));
            loadComments(title);
            textInput.value = "";
        }

        function deleteComment(storyTitle, index) {
            comments[storyTitle].splice(index, 1);
            localStorage.setItem('vinay_vfinal_comments', JSON.stringify(comments));
            loadComments(storyTitle);
        }

        function showHome() { document.getElementById('details-page').classList.remove('active'); document.getElementById('home-page').classList.add('active'); renderStories('None'); }
        function deleteStory(index) { stories.splice(index, 1); localStorage.setItem('vinay_vfinal_v6', JSON.stringify(stories)); renderStories('All'); }
        function editStory(index) {
            const s = stories[index];
            document.getElementById('edit-index').value = index;
            document.getElementById('title').value = s.title;
            document.getElementById('category').value = s.category;
            document.getElementById('fullStory').value = s.story;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        document.getElementById('story-form').onsubmit = function(e) {
            e.preventDefault();
            const index = parseInt(document.getElementById('edit-index').value);
            const newData = { 
                title: document.getElementById('title').value, 
                category: document.getElementById('category').value, 
                story: document.getElementById('fullStory').value,
                likes: index !== -1 ? stories[index].likes : 0,
                isLiked: index !== -1 ? stories[index].isLiked : false
            };
            if(index === -1) stories.push(newData); else stories[index] = newData;
            localStorage.setItem('vinay_vfinal_v6', JSON.stringify(stories));
            document.getElementById('story-form').reset();
            renderStories('All');
        };

        renderStories('None');

        // Security: Detection of "Print Screen" key
        document.addEventListener('keyup', (e) => {
            if (e.key === 'PrintScreen') {
                navigator.clipboard.writeText('');
                alert('Screenshots are discouraged to protect the writer\'s intellectual property.');
            }
        });
    </script>
</body>
</html>
