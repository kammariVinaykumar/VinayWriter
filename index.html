<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vinay Writes | Screenplay Writer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .page { display: none; }
        .active { display: block !important; }
        body.admin-mode .user-view-only { display: none !important; }
        .admin-section { display: none; }
        body.admin-mode .admin-section { display: block !important; }
    </style>
</head>
<body class="bg-black text-white font-sans selection:bg-red-500">

    <nav class="p-5 flex justify-between items-center bg-zinc-900 sticky top-0 z-50 border-b border-zinc-800">
        <h1 class="text-2xl font-bold text-red-500 cursor-pointer" onclick="showHome()">Vinay Writes</h1>
        <button id="view-toggle" onclick="toggleAdmin()" class="bg-zinc-800 px-4 py-2 rounded-full text-xs font-bold border border-zinc-700 uppercase">Admin Login</button>
    </nav>

    <div id="home-page" class="page active">
        <!-- HERO SECTION -->
        <header class="user-view-only pt-32 pb-20 px-6 text-center bg-gradient-to-b from-zinc-900 to-black">
            <h2 class="text-red-500 font-bold tracking-[0.3em] mb-6 uppercase text-sm">Telugu Screenplay Writer</h2>
            <h1 class="text-6xl md:text-8xl font-black mb-8 leading-tight uppercase italic text-white">Stories That <br><span class="text-red-600">Hit Different.</span></h1>
            
            <div class="flex flex-col items-center gap-6 mt-10">
                <h3 class="text-2xl font-black uppercase tracking-widest italic text-zinc-400">Read My Stories</h3>
                <div class="flex flex-wrap justify-center gap-4">
                    <button onclick="renderStories('Short Film Stories')" class="bg-zinc-800 border border-zinc-700 px-8 py-4 rounded-2xl font-black hover:bg-red-600 transition uppercase">Short Film Stories</button>
                    <button onclick="renderStories('Movie Scenes')" class="bg-zinc-800 border border-zinc-700 px-8 py-4 rounded-2xl font-black hover:bg-red-600 transition uppercase">Movie Scenes</button>
                    <button onclick="renderStories('Serial Content')" class="bg-zinc-800 border border-zinc-700 px-8 py-4 rounded-2xl font-black hover:bg-red-600 transition uppercase">Serial Content</button>
                </div>
            </div>
        </header>

        <!-- STORIES GRID (Click చేస్తేనే ఇక్కడ కనిపిస్తాయి) -->
        <section id="portfolio" class="user-view-only py-20 px-6 bg-black">
            <div id="story-grid" class="max-w-7xl mx-auto grid md:grid-cols-3 gap-8">
                <!-- Content injected here by JavaScript -->
            </div>
        </section>

        <!-- CONTACT FOOTER -->
        <footer class="user-view-only py-32 px-6 bg-orange-600">
            <div class="max-w-5xl mx-auto text-center">
                <h3 class="text-5xl md:text-7xl font-black mb-8 italic uppercase text-white">Let's Collaborate.</h3>
                <div class="grid md:grid-cols-2 gap-8 max-w-4xl mx-auto text-white">
                    <div class="p-10 bg-zinc-950 rounded-[3rem] border-2 border-black shadow-2xl">
                        <span class="text-orange-500 font-black uppercase text-[10px] mb-3 block tracking-widest">Email Address</span>
                        <a href="mailto:kammarivinaykumar981@gmail.com" class="text-lg md:text-xl font-bold">kammarivinaykumar981@gmail.com</a>
                    </div>
                    <div class="p-10 bg-zinc-950 rounded-[3rem] border-2 border-black shadow-2xl">
                        <span class="text-green-500 font-black uppercase text-[10px] mb-3 block tracking-widest">WhatsApp Me</span>
                        <a href="https://wa.me/917981587505" target="_blank" class="text-2xl md:text-3xl font-bold">+91 79815 87505</a>
                    </div>
                </div>
            </div>
        </footer>

        <!-- ADMIN SECTION -->
        <section class="admin-section py-20 px-6 bg-zinc-900 min-h-screen">
            <div class="max-w-3xl mx-auto bg-black p-10 rounded-[3rem] border border-red-600 mb-20 shadow-2xl">
                <h2 id="form-title" class="text-3xl font-black text-red-500 mb-10 text-center uppercase italic">Post New Content</h2>
                <form id="story-form" class="space-y-6">
                    <input type="hidden" id="edit-index" value="-1">
                    <input type="text" id="title" placeholder="Story Title" class="w-full p-5 rounded-2xl bg-zinc-900 border border-zinc-800 text-white outline-none font-bold" required>
                    <select id="category" class="w-full p-5 rounded-2xl bg-zinc-900 border border-zinc-800 text-white outline-none font-bold" required>
                        <option value="">Choose Category...</option>
                        <option value="Short Film Stories">Short Film Stories</option>
                        <option value="Movie Scenes">Movie Scenes</option>
                        <option value="Serial Content">Serial Content</option>
                    </select>
                    <textarea id="fullStory" placeholder="Full script content..." class="w-full p-5 h-80 rounded-2xl bg-zinc-900 border border-zinc-800 text-white outline-none"></textarea>
                    <button type="submit" id="submit-btn" class="w-full bg-red-600 py-5 rounded-2xl font-black text-xl hover:bg-red-700 transition uppercase text-white">Publish Story</button>
                </form>
            </div>
            <div class="max-w-7xl mx-auto space-y-20 text-white">
                <div id="admin-lists-container"></div>
            </div>
        </section>
    </div>

    <!-- DETAILS PAGE (Story Full Content) -->
    <div id="details-page" class="page p-6 md:p-20 bg-black min-h-screen">
        <button onclick="showHome()" class="text-red-500 mb-10 font-bold uppercase tracking-widest">← BACK</button>
        <div id="details-content" class="max-w-4xl mx-auto text-white"></div>
    </div>

    <script>
        let isAdmin = false;
        let stories = JSON.parse(localStorage.getItem('vinay_vfinal_v6')) || [];

        function toggleAdmin() {
            if(!isAdmin) {
                if(prompt("Admin Password:") === "vinay123") {
                    isAdmin = true;
                    document.body.classList.add('admin-mode');
                    document.getElementById('view-toggle').innerText = "LOGOUT ADMIN";
                }
            } else {
                isAdmin = false;
                document.body.classList.remove('admin-mode');
                document.getElementById('view-toggle').innerText = "ADMIN LOGIN";
            }
            renderStories('None'); // Logout తర్వాత ఖాళీగా ఉంచుతుంది
        }

        function renderStories(filter = 'None') {
            const userGrid = document.getElementById('story-grid');
            const adminContainer = document.getElementById('admin-lists-container');
            
            const createCard = (s, globalIndex) => {
                // image_75e657.png లో ఉన్న డిజైన్ ప్రకారం కార్డ్
                return `
                <div class="bg-zinc-900/50 border border-zinc-800 rounded-[2.5rem] p-10 relative group hover:border-red-600 transition-all duration-500">
                    ${isAdmin ? `
                        <div class="absolute top-4 right-4 flex gap-2">
                            <button onclick="editStory(${globalIndex})" class="bg-blue-600 p-1 px-2 rounded-full text-[8px] font-black uppercase text-white">Edit</button>
                            <button onclick="toggleHide(${globalIndex})" class="bg-zinc-700 p-1 px-2 rounded-full text-[8px] font-black uppercase text-white">${s.hidden ? 'Show' : 'Hide'}</button>
                            <button onclick="deleteStory(${globalIndex})" class="bg-red-600 p-1 px-2 rounded-full text-[8px] font-black uppercase text-white">Del</button>
                        </div>
                    ` : ''}
                    <span class="text-red-500 text-[10px] font-black uppercase tracking-widest mb-4 block">${s.category}</span>
                    <h3 class="text-4xl font-black mb-8 uppercase italic text-white leading-tight">${s.title}</h3>
                    <button onclick="showDetails(${globalIndex})" class="w-full border border-zinc-700 py-4 rounded-2xl font-black uppercase hover:bg-white hover:text-black transition tracking-widest text-white text-sm">Read Script</button>
                </div>`;
            };

            if(isAdmin) {
                const cats = ['Short Film Stories', 'Movie Scenes', 'Serial Content'];
                adminContainer.innerHTML = cats.map(cat => `
                    <div class="mb-12">
                        <h3 class="text-3xl font-black text-white mb-8 border-b-4 border-red-600 pb-2 uppercase italic">${cat}</h3>
                        <div class="grid md:grid-cols-3 gap-8">
                            ${stories.filter(s => s.category === cat).map(s => createCard(s, stories.indexOf(s))).join('')}
                        </div>
                    </div>
                `).join('');
            } else {
                if(filter === 'None') {
                    userGrid.innerHTML = "";
                    return;
                }
                const filtered = stories.filter(s => !s.hidden && s.category === filter);
                userGrid.innerHTML = filtered.length > 0 
                    ? filtered.map(s => createCard(s, stories.indexOf(s))).join('')
                    : `<p class="col-span-full text-center text-zinc-500 uppercase tracking-widest py-10">No stories found in this category.</p>`;
                
                // స్క్రీన్ కిందకి స్క్రోల్ అవుతుంది
                window.scrollTo({ top: userGrid.offsetTop - 100, behavior: 'smooth' });
            }
        }

        function showDetails(index) {
            const s = stories[index];
            document.getElementById('home-page').classList.remove('active');
            document.getElementById('details-page').classList.add('active');
            document.getElementById('details-content').innerHTML = `
                <h1 class="text-5xl md:text-7xl font-black mb-12 uppercase italic underline decoration-red-600 decoration-8 text-white">${s.title}</h1>
                <div class="text-zinc-300 text-xl leading-relaxed whitespace-pre-line font-medium">${s.story}</div>
            `;
            window.scrollTo(0,0);
        }

        function showHome() {
            document.getElementById('details-page').classList.remove('active');
            document.getElementById('home-page').classList.add('active');
        }

        // Admin Utility Functions
        function deleteStory(index) { if(confirm("Delete story?")) { stories.splice(index, 1); localStorage.setItem('vinay_vfinal_v6', JSON.stringify(stories)); renderStories('All'); } }
        function toggleHide(index) { stories[index].hidden = !stories[index].hidden; localStorage.setItem('vinay_vfinal_v6', JSON.stringify(stories)); renderStories('All'); }
        function editStory(index) {
            const s = stories[index];
            document.getElementById('edit-index').value = index;
            document.getElementById('title').value = s.title;
            document.getElementById('category').value = s.category;
            document.getElementById('fullStory').value = s.story;
            document.getElementById('form-title').innerText = "Edit Story Content";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        document.getElementById('story-form').onsubmit = function(e) {
            e.preventDefault();
            const index = parseInt(document.getElementById('edit-index').value);
            const newData = {
                title: document.getElementById('title').value,
                category: document.getElementById('category').value,
                story: document.getElementById('fullStory').value,
                hidden: index !== -1 ? stories[index].hidden : false
            };
            if(index === -1) stories.push(newData); else stories[index] = newData;
            localStorage.setItem('vinay_vfinal_v6', JSON.stringify(stories));
            document.getElementById('story-form').reset();
            document.getElementById('edit-index').value = "-1";
            document.getElementById('form-title').innerText = "Post New Content";
            renderStories('All');
        };

        // ప్రారంభంలో ఖాళీగా ఉంటుంది
        renderStories('None');
    </script>
</body>
</html>
